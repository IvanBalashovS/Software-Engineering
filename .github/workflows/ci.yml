name: Kotlin CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4  # ✅ Обновлено до v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4  # ✅ Обновлено до v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build ktlintCheck

      - name: Upload Test Report
        uses: actions/upload-artifact@v4  # ✅ КРИТИЧНО: было v3, стало v4
        if: failure()  # Загружаем артефакты только при провале тестов
        with:
          name: test-reports
          path: build/reports/tests/test/
          retention-days: 7  # ✅ Новая опция в v4: хранить артефакты 7 дней